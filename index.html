<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="refresh" content="0; url=dashboard.html">
  <script src="https://unpkg.com/lucide@latest">
    
    
    @media (min-width: 981px) {
      .mobile-menu-btn, .sidebar-close { display: none !important; }
    }

    
    /* --- COMPREHENSIVE MOBILE RESPONSIVE FIXES --- */
    @media (max-width: 1200px) {
      .stats-grid, .grid-main, .grid-2, .hero-grid, .module-grid, .grid {
        grid-template-columns: 1fr !important;
        gap: 15px !important;
      }
    }
    @media (max-width: 980px) {
      :root {
        --topbar-height: auto;
        --sidebar-width: 100%;
      }
      .sidebar {
        display: none !important;
        position: fixed;
        inset: 0;
        width: 100% !important;
        height: 100vh;
        z-index: 2000;
        background: var(--panel) !important;
        padding: 80px 20px 20px !important;
        overflow-y: auto;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        transform: translateX(-20px);
      }
      .sidebar.active {
        display: block !important;
        opacity: 1;
        visibility: visible;
        transform: translateX(0);
      }
      .sidebar-close {
        display: flex !important;
        position: absolute;
        top: 15px;
        right: 15px;
        width: 44px; height: 44px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: var(--panel-2);
        align-items: center;
        justify-content: center;
        z-index: 2001;
      }
      .topbar {
        height: auto !important;
        padding: 12px 15px !important;
        position: sticky;
        top: 0;
      }
      .topbar-inner {
        flex-direction: column !important;
        align-items: stretch !important;
        gap: 10px !important;
      }
      .topbar-main-row {
        display: flex !important;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .top-left, .top-right {
        display: flex !important;
        flex-direction: row !important;
        flex-wrap: wrap !important;
        gap: 8px !important;
        width: 100% !important;
      }
      .mobile-menu-btn, .mobile-preview-btn {
        display: flex !important;
        align-items: center;
        justify-content: center;
        width: 40px; height: 40px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: white;
        color: var(--text);
      }
      .school-pill {
        flex: 1; min-width: 0;
        padding: 6px 10px !important;
      }
      .school-pill strong {
        font-size: 11px !important;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .school-pill span { display: none !important; }
      .control {
        height: 40px !important;
        font-size: 13px !important;
        flex: 1; min-width: 0;
      }
      .search { width: 100% !important; flex: none !important; }
      .icon-btn { width: 40px !important; height: 40px !important; }
      .page-wrap { padding: 15px !important; }
      .page-header { flex-direction: column !important; align-items: stretch !important; }
      .btn-row { flex-direction: column !important; width: 100%; }
      .btn { width: 100%; }
      .d2-header { padding: 15px !important; }
      .d2-header h1 { font-size: 22px !important; }
    }
    @media (min-width: 981px) {
      .mobile-menu-btn, .sidebar-close, .mobile-preview-btn { display: none !important; }
    }
    
    }
    
    </style>
</head>
<body>
  <p>Redirecting to <a href="dashboard.html">Dashboard</a>...</p>
<script>
    

    
    // Mobile Navigation Toggle
    (function() {
      const mobileMenuBtn = document.getElementById('mobileMenuBtn');
      const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');
      const sidebar = document.querySelector('.sidebar');

      if(mobileMenuBtn && sidebar) {
        mobileMenuBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          sidebar.classList.add('active');
          document.body.style.overflow = 'hidden';
        });
      }

      if(sidebarCloseBtn && sidebar) {
        sidebarCloseBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          sidebar.classList.remove('active');
          document.body.style.overflow = '';
        });
      }

      document.addEventListener('click', (e) => {
        if (sidebar && sidebar.classList.contains('active') && !sidebar.contains(e.target) && e.target !== mobileMenuBtn) {
          sidebar.classList.remove('active');
          document.body.style.overflow = '';
        }
      });
    })();
    
  </script>
</body>
</html>
